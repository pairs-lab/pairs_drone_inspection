pairs_uav_managers:

  estimation_manager:

    # loaded state estimator plugins.
    # Step 1 (this session) flies on sim-GPS for a reliable warehouse bring-up.
    # Step 2 (GPS-denied SLAM): add "point_lio" / "liosam" here and set it as the
    # initial_state_estimator once validated in the aisle (Livox is already enabled).
    state_estimators: [
      "gps_garmin",
      "gps_baro",
    ]

    initial_state_estimator: "gps_garmin" # will be used as the first state estimator
    agl_height_estimator: "garmin_agl" # only slightly filtered height for checking min height (not used in control feedback)

  uav_manager:

    takeoff:

      during_takeoff:
        controller: "MpcController"
        tracker: "LandoffTracker"

      after_takeoff:
        controller: "MpcController" # more robust
        # controller: "Se3Controller" # more precise
        tracker: "MpcTracker"

  control_manager:

    # Reactive obstacle bumper. The feature is enabled in the public defaults, but
    # the open-field 1.2 m clearance is wider than half a warehouse aisle, so the
    # drone could never move; tightened here for the ~2.6 m aisles. The bumper node
    # (Livox Mid-360 -> obstacle sectors) is started by inspection_core/avoidance.launch.
    # ⚠ tune against a GPU sim flight together with the planner clearances.
    obstacle_bumper:

      enabled: true

      horizontal:
        min_distance_to_obstacle: 0.5 # [m]
        derived_from_dynamics: true

      vertical:
        min_distance_to_obstacle: 0.4 # [m]
        derived_from_dynamics: true
