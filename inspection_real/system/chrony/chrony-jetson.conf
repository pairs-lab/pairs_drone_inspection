# chrony config for the Jetson Orin NX as a GPS-DENIED time island (single-machine flight).
# Install: sudo cp chrony-jetson.conf /etc/chrony/chrony.conf && sudo systemctl restart chrony
#
# The drone has no internet/GPS in the warehouse, so the Jetson serves its own clock as a
# local stratum-10 source. IMPORTANT: no `makestep` — a mid-run clock jump breaks ROS time.
# Point-LIO needs consistent LiDAR/IMU timestamps, so keep the Mid-360 on host-time (or PTP).

# serve the Jetson clock to the local subnet (operator laptop / any onboard peer)
local stratum 10
allow 192.168.0.0/16
allow 10.0.0.0/8

# discipline the RTC but never step the clock while running
rtcsync
# (deliberately NO `makestep` line)

driftfile /var/lib/chrony/chrony.drift
logdir /var/log/chrony

# If a ground-station NTP server is reachable pre-flight, add it here and let it settle
# BEFORE takeoff, e.g.:
# server 192.168.1.10 iburst
